  <p>
    I am a PhD student in Computer Science at the University of Fribourg, where I work within the
    <a href="https://exascale.info/" target="_blank">eXascale Infolab</a>.
  </p>
  <p>
    My research focuses on Extreme Multi-Label Classification (XMLC), taxonomy-aware learning, and
    multimodal learning. Previously, I completed an MSc at Politecnico di Milano, working on
    multimodal deep learning for survival prediction.
  </p>

